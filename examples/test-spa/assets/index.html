<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Epoca Test SPA</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    padding: 2rem;
    min-height: 100vh;
  }
  h1 { color: #44bb66; margin-bottom: 1rem; }
  .card {
    background: #16213e;
    border-radius: 8px;
    padding: 1rem;
    margin-bottom: 1rem;
    border: 1px solid #0f3460;
  }
  .card h2 { font-size: 0.9rem; color: #888; margin-bottom: 0.5rem; }
  .result {
    font-family: 'SF Mono', monospace;
    font-size: 0.85rem;
    color: #44bb66;
    word-break: break-all;
  }
  .error { color: #ef4444; }
  .pending { color: #888; }
  button {
    background: #44bb66;
    color: #1a1a2e;
    border: none;
    padding: 0.5rem 1rem;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 600;
    margin-right: 0.5rem;
    margin-top: 0.5rem;
  }
  button:hover { background: #33aa55; }
  input[type="text"] {
    background: #0d1117;
    border: 1px solid #0f3460;
    border-radius: 4px;
    color: #e0e0e0;
    padding: 0.4rem 0.6rem;
    font-family: 'SF Mono', monospace;
    font-size: 0.85rem;
    width: 100%;
    margin-top: 0.5rem;
  }
  #log {
    font-family: 'SF Mono', monospace;
    font-size: 0.8rem;
    background: #0d1117;
    border-radius: 4px;
    padding: 0.75rem;
    max-height: 200px;
    overflow-y: auto;
    white-space: pre-wrap;
    color: #8b949e;
  }
</style>
</head>
<body>
  <h1>Epoca Test SPA</h1>

  <div class="card">
    <h2>Host API: getAddress()</h2>
    <div id="addr" class="result pending">not yet called</div>
    <button onclick="testGetAddress()">Call getAddress()</button>
  </div>

  <div class="card">
    <h2>Host API: sign()</h2>
    <div id="sig" class="result pending">not yet called</div>
    <button onclick="testSign()">Call sign("hello")</button>
  </div>

  <div class="card">
    <h2>system.remark</h2>
    <div id="rmrk" class="result pending">not yet called</div>
    <input type="text" id="remark-text" placeholder="Remark text" value="hello from epoca">
    <button onclick="testRemark()">Sign Remark</button>
  </div>

  <div class="card">
    <h2>Network Isolation Test</h2>
    <div id="net" class="result pending">not yet tested</div>
    <button onclick="testNetwork()">Try fetch(https://...)</button>
  </div>

  <div class="card">
    <h2>Event Log</h2>
    <div id="log"></div>
  </div>

<script>
  function log(msg) {
    const el = document.getElementById('log');
    el.textContent += new Date().toISOString().slice(11,19) + ' ' + msg + '\n';
    el.scrollTop = el.scrollHeight;
  }

  // SCALE codec helpers (minimal, enough for system.remark)
  function scaleCompactU32(n) {
    if (n < 64) return new Uint8Array([n << 2]);
    if (n < 16384) return new Uint8Array([(n << 2) | 1, n >> 6]);
    if (n < 1073741824) return new Uint8Array([(n << 2) | 2, n >> 6, n >> 14, n >> 22]);
    throw new Error('Value too large for compact encoding');
  }

  function hexEncode(bytes) {
    return '0x' + Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  function textToBytes(str) {
    return new TextEncoder().encode(str);
  }

  // Build a system.remark(remark) call data
  // Pallet index 0x00, call index 0x00 (System), remark is call 0x00::0x00
  // Actually on most Substrate chains: System = pallet 0, remark = call 0
  // Call data: [pallet_idx, call_idx, compact_len, ...remark_bytes]
  function buildRemarkCallData(remarkStr) {
    const remarkBytes = textToBytes(remarkStr);
    const lenCompact = scaleCompactU32(remarkBytes.length);
    // system.remark: pallet_index=0x00, call_index=0x00
    const callData = new Uint8Array(2 + lenCompact.length + remarkBytes.length);
    callData[0] = 0x00; // System pallet
    callData[1] = 0x00; // remark call
    callData.set(lenCompact, 2);
    callData.set(remarkBytes, 2 + lenCompact.length);
    return callData;
  }

  log('SPA loaded');
  log('window.epoca exists: ' + (typeof window.epoca !== 'undefined'));
  if (window.epoca) {
    log('window.epoca.sign: ' + typeof window.epoca.sign);
    log('window.epoca.getAddress: ' + typeof window.epoca.getAddress);
    log('window.epoca.on: ' + typeof window.epoca.on);
  }

  async function testGetAddress() {
    const el = document.getElementById('addr');
    el.className = 'result pending';
    el.textContent = 'calling...';
    log('getAddress() called');
    try {
      const addr = await window.epoca.getAddress();
      el.className = 'result';
      el.textContent = addr;
      log('getAddress() resolved: ' + addr);
    } catch (e) {
      el.className = 'result error';
      el.textContent = e.message;
      log('getAddress() rejected: ' + e.message);
    }
  }

  async function testSign() {
    const el = document.getElementById('sig');
    el.className = 'result pending';
    el.textContent = 'calling...';
    log('sign("hello") called');
    try {
      const sig = await window.epoca.sign('hello');
      el.className = 'result';
      el.textContent = sig;
      log('sign() resolved: ' + sig);
    } catch (e) {
      el.className = 'result error';
      el.textContent = e.message;
      log('sign() rejected: ' + e.message);
    }
  }

  async function testRemark() {
    const el = document.getElementById('rmrk');
    el.className = 'result pending';
    el.textContent = 'building call data...';

    const remarkText = document.getElementById('remark-text').value.trim();
    if (!remarkText) {
      el.className = 'result error';
      el.textContent = 'Remark text is required';
      return;
    }

    const callData = buildRemarkCallData(remarkText);
    const callDataHex = hexEncode(callData);
    log('system.remark call data: ' + callDataHex);

    try {
      el.textContent = 'getting address...';
      const addr = await window.epoca.getAddress();
      log('Signer: ' + addr);

      el.textContent = 'signing...';
      const sig = await window.epoca.sign(callDataHex);
      log('Signature: ' + sig);

      el.className = 'result';
      el.textContent =
        'system.remark signed\n' +
        'Signer:    ' + addr + '\n' +
        'Call data: ' + callDataHex + '\n' +
        'Signature: ' + sig;
      log('system.remark extrinsic ready');
    } catch (e) {
      el.className = 'result error';
      el.textContent = e.message;
      log('system.remark failed: ' + e.message);
    }
  }

  async function testNetwork() {
    const el = document.getElementById('net');
    el.className = 'result pending';
    el.textContent = 'fetching...';
    log('fetch() called');
    try {
      const resp = await fetch('https://httpbin.org/get');
      el.className = 'result error';
      el.textContent = 'FAIL: network request succeeded (status ' + resp.status + ')';
      log('fetch() succeeded unexpectedly');
    } catch (e) {
      el.className = 'result';
      el.textContent = 'PASS: blocked (' + e.message + ')';
      log('fetch() blocked: ' + e.message);
    }
  }
</script>
</body>
</html>
